<!-- Notification -->
<div class="device-notification" *ngIf="showNotification()">
  {{ notificationMessage() }}
</div>

<!-- ======================== PRE JOIN ======================== -->
<ng-container *ngIf="!inCall()">
  <mat-card class="pre-join-card">
    <h2>Join Video Call</h2>

    <video #preview autoplay muted playsinline></video>

    <div class="input-group">
      <input [(ngModel)]="username" placeholder="Your name"  class="input-field" />
      <input [(ngModel)]="roomName" placeholder="Room name"  class="input-field" />
    </div>

    <div class="device-select">

      <div class="select-group">
        <label>🎤 Microphone</label>
        <select
          [ngModel]="selectedAudioDevice()"
          (ngModelChange)="selectedAudioDevice.set($event); changeMicPreJoin()">
          <option *ngFor="let d of audioDevices()" [value]="d.deviceId">
            {{ d.label || 'Microphone' }}
          </option>
        </select>
      </div>

      <div class="select-group">
        <label>📷 Camera</label>
        <select
          [ngModel]="selectedVideoDevice()"
          (ngModelChange)="selectedVideoDevice.set($event); changeCameraPreJoin()">
          <option *ngFor="let d of videoDevices()" [value]="d.deviceId">
            {{ d.label || 'Camera' }}
          </option>
        </select>
      </div>

      <div class="select-group">
        <label>🔊 Speaker</label>
        <select
          [ngModel]="selectedSpeakerDevice()"
          (ngModelChange)="selectedSpeakerDevice.set($event); changeSpeaker()">
          <option *ngFor="let d of speakerDevices()" [value]="d.deviceId">
            {{ d.label || 'Speaker' }}
          </option>
        </select>
        <small *ngIf="speakerDevices().length === 0" class="warn-text">
          ⚠️ Not supported in this browser
        </small>
      </div>

    </div>

    <div class="controls">
      <button mat-icon-button (click)="toggleAudio()">
        <mat-icon>{{ isAudioEnabled() ? 'mic' : 'mic_off' }}</mat-icon>
      </button>
      <button mat-icon-button (click)="toggleVideo()">
        <mat-icon>{{ isVideoEnabled() ? 'videocam' : 'videocam_off' }}</mat-icon>
      </button>
    </div>

    <button mat-raised-button color="primary" (click)="joinCall()">
      Join Call
    </button>
  </mat-card>
</ng-container>

<!-- ======================== IN CALL ======================== -->
<ng-container *ngIf="inCall()">
  <div class="call-container">

    <div class="video-grid">

      <div class="video-tile local-tile">
        <video #localVideo autoplay muted playsinline></video>
        <span class="participant-label">You ({{ username }})</span>
      </div>

      <div class="video-tile" *ngFor="let remote of callService.remoteStreams()">
        <video [srcObject]="remote.stream" autoplay playsinline></video>
        <span class="participant-label">{{ remote.participantId }}</span>
      </div>

    </div>

    <div class="toolbar">

      <button mat-icon-button (click)="toggleAudio()">
        <mat-icon>{{ isAudioEnabled() ? 'mic' : 'mic_off' }}</mat-icon>
      </button>

      <button mat-icon-button (click)="toggleVideo()">
        <mat-icon>{{ isVideoEnabled() ? 'videocam' : 'videocam_off' }}</mat-icon>
      </button>

      <div class="toolbar-select">

        <select
          [ngModel]="selectedAudioDevice()"
          (ngModelChange)="selectedAudioDevice.set($event); changeMicInCall()">
          <option *ngFor="let d of audioDevices()" [value]="d.deviceId">
            {{ d.label || 'Mic' }}
          </option>
        </select>

        <select
          [ngModel]="selectedVideoDevice()"
          (ngModelChange)="selectedVideoDevice.set($event); changeCameraInCall()">
          <option *ngFor="let d of videoDevices()" [value]="d.deviceId">
            {{ d.label || 'Cam' }}
          </option>
        </select>

        <select
          [ngModel]="selectedSpeakerDevice()"
          (ngModelChange)="selectedSpeakerDevice.set($event); changeSpeaker()">
          <option *ngFor="let d of speakerDevices()" [value]="d.deviceId">
            {{ d.label || 'Speaker' }}
          </option>
        </select>

      </div>

      <button mat-icon-button color="warn" (click)="leaveCall()">
        <mat-icon>call_end</mat-icon>
      </button>

    </div>
  </div>
</ng-container>
